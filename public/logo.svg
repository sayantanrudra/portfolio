<svg width="210" height="70" viewBox="0 0 210 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>
  <text x="105" y="36" fill="#0a0a0a" style="fill: #0a0a0a;" class="logo-text" font-family="'Segoe UI',system-ui,sans-serif" font-size="23" font-weight="800" text-anchor="middle" letter-spacing="1.5">SAYANTAN</text>
  <rect x="62" y="43" width="82" height="2" rx="1" fill="url(#logoGradient)"/>
  <text x="105" y="63" fill="#666" style="fill: #666;" class="logo-sub" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="400" text-anchor="middle" letter-spacing="6">RUDRA</text>
  <style>
    html.dark .logo-text { fill: #ffffff !important; }
    html.dark .logo-sub { fill: #aaaaaa !important; }
  </style>
</svg>